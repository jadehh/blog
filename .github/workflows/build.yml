name: Build Dev

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # If your repository depends on submodule, please see: https://github.com/actions/checkout
          submodules: recursive
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          # Examples: 20, 18.19, >=16.20.2, lts/Iron, lts/Hydrogen, *, latest, current, node
          # Ref: https://github.com/actions/setup-node#supported-version-syntax
          node-version: '20'
      - name: Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.OS }}-npm-cache
          restore-keys: |
            ${{ runner.OS }}-npm-cache
      - name: Install Dependencies
        run: |
          # 1. 显式设置正确的 registry，并确保配置写入
          npm config set registry https://registry.npmmirror.com/
          # 2. 验证配置是否生效
          echo "当前 Registry: $(npm config get registry)"
    
          # 3. 如果项目有 .npmrc，可能需要临时忽略它，或确保其内容正确
          # 可选：如果有全局或其他位置的 .npmrc 干扰，可以尝试指定使用项目配置
          # npm config set userconfig $(pwd)/.npmrc
          # 4. 彻底清理缓存，避免旧缓存干扰
          npm cache clean --force
    
          # 5. 执行安装，并携带详细日志以便后续排查
          npm install --verbose
        env:
          # 6. 【关键】设置环境变量，从系统层面强制指定 registry
          NPM_CONFIG_REGISTRY: https://registry.npmmirror.com/
      - name: Build
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Clone Code
        uses: actions/checkout@v3
        with:
          repository: jadehh/blog
          path: code
          ref: main
          fetch-depth: 0  # 显示所有提交的日志
          token: ${{ secrets.GH_PAT }}


      - name: Add Git File
        run: |
          cd code
          git config --global user.email "jadehh@live.com"
          git config --global user.name "jade"
          checkname=$(git rev-list --max-parents=0 HEAD)
          git checkout  $checkname -b public  ##分支不存在用这个
          cp -r ../public/* ./
          git add -A  ## 添加所有文件
          git commit -m  "${{ github.event.head_commit.message }}"


      - name: Upload Public branch
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GH_PAT }}
          repository: jadehh/blog
          directory: code
          force: true
          tags: true
          branch: public
        env:
          GITHUB_ACTOR: jadehh

#      - name: Sync to Gitee
#        uses: wearerequired/git-mirror-action@master
#        env:
#          # 注意在 Settings->Secrets 配置 GITEE_RSA_PRIVATE_KEY
#          SSH_PRIVATE_KEY: ${{ secrets.GITEE_RSA_PRIVATE_KEY }}
#        with:
#          # 注意替换为你的 GitHub 源仓库地址
#          source-repo: git@github.com:jadehh/blog.git
#          # 注意替换为你的 Gitee 目标仓库地址
#          destination-repo: git@gitee.com:jadehh_743/blog.git

#      - name: Build Gitee Pages
#        uses: yanglbme/gitee-pages-action@master
#        with:
#          # 注意替换为你的 Gitee 用户名
#          gitee-username: jadehh_743
#          # 注意在 Settings->Secrets 配置 GITEE_PASSWORD
#          gitee-password: ${{ secrets.GITEE_PASSWORD }}
#          # 注意替换为你的 Gitee 仓库
#          gitee-repo: jadehh_743/blog

  deploy:
    #测试Deploy
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


